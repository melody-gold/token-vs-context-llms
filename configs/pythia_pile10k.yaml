# Hidden-state baseline on Pile-10k with a small Pythia model.
# This is larger than the smoke test but still intended to be feasible locally.
model:
  name: EleutherAI/pythia-70m
  device: cpu
  max_length: 128
  layers: [0, 1, 2, 3, 4, 5]

dataset:
  name: NeelNanda/pile-10k
  subset: null
  split: train[:1000]
  text_column: text
  max_texts: 1000

extraction:
  batch_size: 4
  max_tokens: 25000
  output_path: artifacts/extractions/pythia_pile10k.npz

probe:
  ridge_alpha: 0.0
  test_fraction: 0.2
  random_seed: 0
  output_path: results/generated/pythia_pile10k_metrics.json
