# Copy this file for the main proposal run.
# First stabilize the hidden-state baseline, then add SAE-specific config
# once you choose a compatible SAE release for the same model family.
model:
  name: google/gemma-2-2b
  device: cuda
  max_length: 256
  layers: null

dataset:
  # Replace these with the exact dataset identifier you plan to use.
  # Keep a small slice while iterating locally, then scale the split up.
  name: your-huggingface-dataset
  subset: null
  split: train[:1000]
  text_column: text
  max_texts: 1000

extraction:
  # Token budget is usually the main cost control knob.
  batch_size: 8
  max_tokens: 50000
  output_path: artifacts/extractions/main_experiment.npz

probe:
  # 0.0 is affine. Set >0 later for ridge ablations.
  ridge_alpha: 0.0
  test_fraction: 0.2
  random_seed: 0
  output_path: results/generated/main_experiment_metrics.json
