# Replace the placeholder values below with the actual model, dataset,
# and output locations for your main experiment.
model:
  name: google/gemma-2-2b
  device: cuda
  max_length: 256
  layers: null

dataset:
  name: your-huggingface-dataset
  subset: null
  split: train[:1000]
  text_column: text
  max_texts: 1000

extraction:
  batch_size: 8
  max_tokens: 50000
  output_path: artifacts/extractions/main_experiment.npz

probe:
  ridge_alpha: 1.0
  test_fraction: 0.2
  random_seed: 0
  output_path: results/generated/main_experiment_metrics.json
